name: 전국 상가 크롤링

on:
  # 매일 02:00 KST (= 17:00 UTC)
  schedule:
    - cron: '0 17 * * *'

  # 수동 실행 (특정 지역 테스트 또는 즉시 재실행)
  workflow_dispatch:
    inputs:
      sido:
        description: '시/도 (예: 경기도). 비워두면 전국.'
        required: false
        default: ''
      sigungu:
        description: '시/군/구 (예: 수원시 장안구). sido 입력 시에만 유효.'
        required: false
        default: ''
      dong:
        description: '읍/면/동 (예: 율전동). sido + sigungu 입력 시에만 유효.'
        required: false
        default: ''

jobs:
  crawl:
    name: 상가 매물 수집 & DB 저장
    runs-on: ubuntu-latest
    timeout-minutes: 360 # 전국 크롤링 최대 6시간

    env:
      NAVER_NID_SES: ${{ secrets.NAVER_NID_SES }}
      NAVER_NID_AUT: ${{ secrets.NAVER_NID_AUT }}
      SUPABASE_URL:  ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY:  ${{ secrets.SUPABASE_KEY }}

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.12 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 크롤러 의존성 설치
        run: pip install httpx "playwright>=1.44.0" "supabase>=2.4.0" python-dotenv

      - name: Playwright Chromium 설치
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: 크롤링 실행
        env:
          SIDO:    ${{ github.event.inputs.sido }}
          SIGUNGU: ${{ github.event.inputs.sigungu }}
          DONG:    ${{ github.event.inputs.dong }}
        run: |
          ARGS=()
          [ -n "$SIDO" ]    && ARGS+=(--sido    "$SIDO")
          [ -n "$SIGUNGU" ] && ARGS+=(--sigungu "$SIGUNGU")
          [ -n "$DONG" ]    && ARGS+=(--dong    "$DONG")
          python crawl_scheduled.py "${ARGS[@]}"

      - name: 실패 요약
        if: failure()
        run: |
          echo "::error::크롤링 중 오류가 발생했습니다. 위 로그를 확인하세요."
          echo "주요 원인: NID 쿠키 만료 / Supabase 연결 실패 / 네이버 API 변경"
